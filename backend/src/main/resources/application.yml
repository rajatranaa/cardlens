server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none          # schema managed by db/schema.sql
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

cardlens:
  api-key: ${CARDLENS_API_KEY}          # static key guarding /api/**
  markdown:                             # PDF -> Markdown via markitdown (Python)
    python: ${MARKDOWN_PYTHON:python}   # path to python with markitdown[pdf] installed
    script: ${MARKDOWN_SCRIPT:scripts/pdf_to_markdown.py}
    timeout-seconds: ${MARKDOWN_TIMEOUT:60}
  gmail:
    client-id: ${GMAIL_CLIENT_ID}
    client-secret: ${GMAIL_CLIENT_SECRET}
    refresh-token: ${GMAIL_REFRESH_TOKEN}
    user: me

logging:
  level:
    root: INFO
    com.rana.cardlens: INFO
